
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&amp;family=Montserrat:wght@200;300;400&amp;display=swap');
        </style>
    </defs>

    <!-- Emblem / Icon mark -->
    <!-- Outer diamond frame -->
    <g transform="translate(68, 80)">
        <!-- Diamond outline -->
        <polygon
                points="0,-42 36,-0 0,42 -36,0"
                fill="none"
                stroke="#b88e8d"
                stroke-width="1.2"
        />
        <!-- Inner diamond -->
        <polygon
                points="0,-30 25,0 0,30 -25,0"
                fill="none"
                stroke="#b88e8d"
                stroke-width="0.6"
        />

        <!-- Top decorative dot -->
        <circle cx="0" cy="-42" r="2" fill="#b88e8d"/>
        <!-- Bottom decorative dot -->
        <circle cx="0" cy="42" r="2" fill="#b88e8d"/>
        <!-- Left decorative dot -->
        <circle cx="-36" cy="0" r="2" fill="#b88e8d"/>
        <!-- Right decorative dot -->
        <circle cx="36" cy="0" r="2" fill="#b88e8d"/>

        <!-- Center stylized "M" needle/thread motif -->
        <!-- Needle body -->
        <line x1="0" y1="-20" x2="0" y2="20" stroke="#b88e8d" stroke-width="1.4"/>
        <!-- Needle eye (small ellipse at top) -->
        <ellipse cx="0" cy="-16" rx="3.5" ry="2.5" fill="none" stroke="#b88e8d" stroke-width="1"/>
        <!-- Thread arcs left -->
        <path d="M -10,0 Q -5,-8 0,-5" fill="none" stroke="#b88e8d" stroke-width="0.9"/>
        <path d="M -10,0 Q -5,8 0,5" fill="none" stroke="#b88e8d" stroke-width="0.9"/>
        <!-- Thread arcs right -->
        <path d="M 10,0 Q 5,-8 0,-5" fill="none" stroke="#b88e8d" stroke-width="0.9"/>
        <path d="M 10,0 Q 5,8 0,5" fill="none" stroke="#b88e8d" stroke-width="0.9"/>

        <!-- Corner tick marks on diamond -->
        <line x1="-36" y1="-6" x2="-36" y2="6" stroke="#b88e8d" stroke-width="0.8"/>
        <line x1="36" y1="-6" x2="36" y2="6" stroke="#b88e8d" stroke-width="0.8"/>
    </g>

    <!-- Wordmark -->
    <!-- MAISON -->
    <text
            x="128"
            y="73"
            font-family="'Cormorant Garamond', 'Georgia', serif"
            font-size="36"
            font-weight="400"
            letter-spacing="10"
            fill="#2c2020"
    >MAISON</text>

    <!-- Thin rule line -->
    <line x1="128" y1="83" x2="460" y2="83" stroke="#b88e8d" stroke-width="0.7"/>

    <!-- ARTISAN -->
    <text
            x="132"
            y="103"
            font-family="'Montserrat', 'Helvetica Neue', sans-serif"
            font-size="12.5"
            font-weight="300"
            letter-spacing="9"
            fill="#b88e8d"
    >ARTISAN</text>

    <!-- Tagline -->
    <text
            x="132"
            y="121"
            font-family="'Cormorant Garamond', 'Georgia', serif"
            font-size="10"
            font-weight="300"
            font-style="italic"
            letter-spacing="2"
            fill="#9e9e9e"
    >handcrafted with care</text>
</svg>
